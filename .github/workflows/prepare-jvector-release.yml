name: Cut JVector Release Branch

on:
  workflow_dispatch:
    inputs:
      opensearch_version:
        description: 'OpenSearch version (e.g., 3.7.0)'
        required: true
        type: string
      jvector_version:
        description: 'JVector version (e.g., 3.7)'
        required: true
        type: string
      jvector_commit:
        description: 'JVector branding commit SHA to cherry-pick'
        required: false
        type: string
        default: 'f53275dfe46f6f2260038b722cc053135d475950'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: opensearch-project/neural-search
          ref: ${{ inputs.opensearch_version }}
          fetch-depth: 0
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add jvector remote and fetch
        run: |
          git remote add jvector https://github.com/${{ github.repository }}.git
          git fetch jvector jvector_main
      
      - name: Create release branch from upstream version
        run: |
          BRANCH_NAME="jvector_${{ inputs.opensearch_version }}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b $BRANCH_NAME
      
      - name: Cherry-pick jvector branding changes
        id: cherry_pick
        continue-on-error: true
        run: |
          git cherry-pick -m 1 --no-commit ${{ inputs.jvector_commit }}
          
          if [ $? -eq 0 ]; then
            git commit -m "Apply JVector branding for version ${{ inputs.jvector_version }}"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            git reset --hard HEAD
          fi
      
      - name: Run spotlessApply
        if: steps.cherry_pick.outputs.success == 'true'
        id: spotless
        continue-on-error: true
        run: |
          ./gradlew spotlessApply
          
          if [ $? -eq 0 ]; then
            if [ -n "$(git status --porcelain)" ]; then
              git add .
              git commit -m "Apply spotless formatting"
            fi
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run all tests and build
        if: steps.cherry_pick.outputs.success == 'true' && steps.spotless.outputs.success == 'true'
        id: tests
        continue-on-error: true
        run: |
          ./gradlew check integTest backwards-compatibility-test build
          
          if [ $? -eq 0 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Determine failure step
        if: failure() || steps.cherry_pick.outputs.success == 'false' || steps.spotless.outputs.success == 'false' || steps.tests.outputs.success == 'false'
        id: failure_info
        run: |
          if [ "${{ steps.cherry_pick.outputs.success }}" == "false" ]; then
            echo "failed_step=Cherry-pick" >> $GITHUB_OUTPUT
            echo "failed_details=Cherry-pick of commit ${{ inputs.jvector_commit }} failed with conflicts" >> $GITHUB_OUTPUT
          elif [ "${{ steps.spotless.outputs.success }}" == "false" ]; then
            echo "failed_step=Spotless formatting" >> $GITHUB_OUTPUT
            echo "failed_details=Spotless formatting failed" >> $GITHUB_OUTPUT
          elif [ "${{ steps.tests.outputs.success }}" == "false" ]; then
            echo "failed_step=Tests and build" >> $GITHUB_OUTPUT
            echo "failed_details=One or more tests failed: check, integTest, backwards-compatibility-test, or build" >> $GITHUB_OUTPUT
          else
            echo "failed_step=Unknown" >> $GITHUB_OUTPUT
            echo "failed_details=Workflow failed at an unknown step" >> $GITHUB_OUTPUT
          fi
      
      - name: Create failure issue
        if: failure() || steps.cherry_pick.outputs.success == 'false' || steps.spotless.outputs.success == 'false' || steps.tests.outputs.success == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const failedStep = '${{ steps.failure_info.outputs.failed_step }}';
            const failedDetails = '${{ steps.failure_info.outputs.failed_details }}';
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release preparation failed: ${failedStep} - JVector ${{ inputs.jvector_version }}`,
              body: `## Release Preparation Failed
            
                    **Failed Step:** ${failedStep}
                    **OpenSearch Version:** ${{ inputs.opensearch_version }}
                    **JVector Version:** ${{ inputs.jvector_version }}
                    **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                    
                    ### Failure Details
                    
                    ${failedDetails}
                    
                    ### Next Steps
                    
                    1. Review the workflow logs for detailed error messages
                    2. Follow manual resolution steps above
                    3. Fix the issue locally
                    4. Push branch and create PR manually
                    5. Close this issue once resolved
                  `,
              labels: ['autocut', 'release']
            });
            
            core.setFailed(\`Release preparation failed at: \${failedStep}. Created issue #\${issue.data.number}\`);
      
      - name: Push branch
        if: steps.tests.outputs.success == 'true'
        run: |
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ${{ env.BRANCH_NAME }}
      
      - name: Create Pull Request
        if: steps.tests.outputs.success == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release: JVector ${{ inputs.jvector_version }} (OpenSearch ${{ inputs.opensearch_version }})`,
              head: '${{ env.BRANCH_NAME }}',
              base: 'jvector_main',
              body: `## JVector Release ${{ inputs.jvector_version }}
                    This PR prepares the JVector release based on OpenSearch ${{ inputs.opensearch_version }}.
                    
                    ### Changes
                    
                    - [x] Synced with upstream OpenSearch neural-search
                    - [x] Applied JVector branding
                    - [x] Applied code formatting
                    
                    ### Test Results
                    
                    All tests passed:
                    - [x] Unit tests
                    - [x] Integration tests
                    - [x] Backward compatibility tests
                    - [x] Build
                    
                    **Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                    `,
              labels: [ 'autocut', 'release' ]
            });
            
            core.info(\`Created PR #\${pr.data.number}\`);
