name: Build and Test Neural Search
on:
  schedule:
    - cron: '0 0 * * *'  # every night
  push:
    branches:
      - "*"
      - "feature/**"
  pull_request:
    branches:
      - "*"
      - "feature/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  Check-neural-search-linux:
    strategy:
      matrix:
        java: [21, 25]
        os: [ubuntu-latest]

    permissions:
      contents: read
      id-token: write

    name: Gradle Check Linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'gradle'

      - name: Run build
        run: ./gradlew check --parallel -x integTest

      - name: Upload Coverage Report
        # No coverage reports
        if: ${{ false && !cancelled() && contains(matrix.os, 'ubuntu') && contains(matrix.java, '21') }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL != '' }}
          use_pypi: true

  Check-neural-search-windows:
    strategy:
      matrix:
        java: [21, 25]
        os: [windows-latest]

    name: Gradle Check Windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'gradle'

      - name: Run build
        run: |
          ./gradlew check --parallel -x integTest

  Precommit-neural-search-linux:
    strategy:
      matrix:
        java: [21, 25]
        os: [ubuntu-latest]

    name: Pre-commit Linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'gradle'

      - name: Run build
        run: ./gradlew precommit -x integTest --parallel

  integTest:
    needs: Precommit-neural-search-linux
    strategy:
      matrix:
        java: [ 21, 25 ]
        os: [ ubuntu-latest ]
    name: Integ Test JDK${{ matrix.java }}, ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          cache: 'gradle'
          distribution: temurin
      - name: Build and Run Tests
        run: |
          ./gradlew integTest --parallel

  integMultiNodeTest:
      needs: Precommit-neural-search-linux
      strategy:
        matrix:
          java: [ 21 ]
          os: [ ubuntu-latest ]
          configureNodeRoles: [ false, true ]
      name: Multi-Node Integ Test JDK${{ matrix.java }}, With Role Assignment ${{ matrix.configureNodeRoles }}
      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v4
        - name: Set up JDK ${{ matrix.java }}
          uses: actions/setup-java@v4
          with:
            java-version: ${{ matrix.java }}
            distribution: temurin
            cache: 'gradle'
        - name: Build and Run Tests
          run: |
            ./gradlew integTest --parallel -PnumNodes=3 -PconfigureNodeRoles=${{ matrix.configureNodeRoles }}
